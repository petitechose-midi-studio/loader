name: Candidate

run-name: Candidate ${{ inputs.source_sha }} / ${{ inputs.request_id || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Source commit SHA to package"
        required: true
        type: string
      request_id:
        description: "Optional dispatch correlation id"
        required: false
        default: ""
        type: string

concurrency:
  group: candidate-${{ inputs.source_sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: candidate (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            filename: midi-studio-loader-linux-x86_64
          - platform: windows-latest
            filename: midi-studio-loader-windows-x86_64.exe
          - platform: macos-15-intel
            filename: midi-studio-loader-macos-x86_64
          - platform: macos-latest
            filename: midi-studio-loader-macos-arm64

    steps:
      - name: Checkout source SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Validate source SHA
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          if [ "$sha" != "${{ inputs.source_sha }}" ]; then
            echo "Checked out SHA does not match input" >&2
            echo "input=${{ inputs.source_sha }}" >&2
            echo "head=$sha" >&2
            exit 1
          fi

      - name: Install Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev libusb-1.0-0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Collect candidate binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/midi-studio-loader.exe dist/${{ matrix.filename }}

      - name: Collect candidate binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/midi-studio-loader "dist/${{ matrix.filename }}"

      - name: Upload candidate binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.filename }}
          path: dist/${{ matrix.filename }}

  metadata:
    name: candidate metadata
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout source SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: main
          path: workspace

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Resolve candidate tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          echo "candidate_tag=rc-${{ inputs.source_sha }}" >> "$GITHUB_OUTPUT"

      - name: Download candidate binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten candidate binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts_flat
          find artifacts -maxdepth 5 -type f -print -exec cp '{}' artifacts_flat/ \;
          ls -la artifacts_flat

      - name: Generate candidate metadata inputs
        shell: bash
        run: |
          set -euo pipefail
          cat > artifacts_flat/candidate-artifacts.json <<'EOF'
          [
            {
              "id": "loader-linux-x86_64",
              "filename": "midi-studio-loader-linux-x86_64",
              "kind": "binary",
              "os": "linux",
              "arch": "x86_64"
            },
            {
              "id": "loader-windows-x86_64",
              "filename": "midi-studio-loader-windows-x86_64.exe",
              "kind": "binary",
              "os": "windows",
              "arch": "x86_64"
            },
            {
              "id": "loader-macos-x86_64",
              "filename": "midi-studio-loader-macos-x86_64",
              "kind": "binary",
              "os": "macos",
              "arch": "x86_64"
            },
            {
              "id": "loader-macos-arm64",
              "filename": "midi-studio-loader-macos-arm64",
              "kind": "binary",
              "os": "macos",
              "arch": "arm64"
            }
          ]
          EOF
          cat > artifacts_flat/input-repos.json <<'EOF'
          [
            {
              "id": "loader",
              "repo": "petitechose-midi-studio/loader",
              "sha": "${{ inputs.source_sha }}"
            }
          ]
          EOF
          cat > artifacts_flat/toolchain.json <<'EOF'
          {
            "rust": "stable"
          }
          EOF

      - name: Write candidate manifest, checksums, and signature
        shell: bash
        working-directory: workspace
        env:
          MS_CANDIDATE_ED25519_SK: ${{ secrets.MS_CANDIDATE_ED25519_SK }}
        run: |
          set -euo pipefail
          uv run ms release candidate write \
            --artifacts-dir ../artifacts_flat \
            --artifacts-json ../artifacts_flat/candidate-artifacts.json \
            --input-repos-json ../artifacts_flat/input-repos.json \
            --producer-repo petitechose-midi-studio/loader \
            --producer-kind loader-binaries \
            --workflow-file .github/workflows/candidate.yml \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --manifest-path ../artifacts_flat/candidate.json \
            --checksums-path ../artifacts_flat/checksums.txt \
            --sig-path ../artifacts_flat/candidate.json.sig \
            --recipe-base-dir .. \
            --recipe-path .github/workflows/candidate.yml \
            --recipe-path Cargo.toml \
            --recipe-path Cargo.lock \
            --toolchain-json ../artifacts_flat/toolchain.json

      - name: Publish signed candidate release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.candidate_tag }}"
          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload \
              "$tag" \
              artifacts_flat/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create \
              "$tag" \
              artifacts_flat/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "candidate $tag" \
              --notes "Candidate artifacts for ${{ inputs.source_sha }}" \
              --draft \
              --prerelease
          fi
